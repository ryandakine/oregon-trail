<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Oregon Trail — AI Edition</title>
  <meta name="description" content="AI-native Oregon Trail. Every playthrough is unique — powered by Claude as the dungeon master. Free, browser-playable, no login required.">
  <link rel="canonical" href="https://trail.osi-cyber.com/">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://trail.osi-cyber.com/">
  <meta property="og:title" content="The Oregon Trail — AI Edition">
  <meta property="og:description" content="Every run is a different story. An AI dungeon master generates unique events grounded in real 1848 history. Free, no login.">
  <meta property="og:image" content="https://trail.osi-cyber.com/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="The Oregon Trail — AI Edition">
  <meta name="twitter:description" content="AI-native Oregon Trail. No two runs are the same. Play free.">
  <meta name="twitter:image" content="https://trail.osi-cyber.com/og-image.png">

  <meta name="theme-color" content="#111111">
  <script defer data-domain="trail.osi-cyber.com" src="https://plausible.io/js/script.js"></script>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="boot-screen">
    <pre id="boot-text" style="color:#ffc832;font-family:'IBM Plex Mono',monospace;font-size:16px;padding:2ch;"></pre>
  </div>
  <div id="terminal" style="display:none;">
    <div id="top-bar"></div>
    <div id="game-area">
      <aside id="roster"></aside>
      <main id="narrative"></main>
    </div>
    <div id="action-bar"></div>
  </div>
  <div id="newspaper-overlay" class="hidden"></div>
  <div id="pause-overlay" class="hidden"></div>
  <div id="tombstone-overlay" class="hidden"></div>

  <script src="html2canvas.min.js"></script>
  <script src="game.js"></script>
  <script src="ui.js"></script>
  <script src="newspaper.js"></script>
  <script src="tombstone.js"></script>
  <script>
    // Boot sequence animation
    (async function boot() {
      const el = document.getElementById('boot-text');
      const lines = [
        '> OREGON TRAIL SIMULATION v1848.04',
        '> LOADING HISTORICAL CONTEXT...... OK',
        '> INITIALIZING AI DUNGEON MASTER.. OK',
        '> CALIBRATING TONE SYSTEM........ OK',
        '> READY.',
        ''
      ];
      for (const line of lines) {
        for (let i = 0; i < line.length; i++) {
          el.textContent += line[i];
          await new Promise(r => setTimeout(r, 12));
        }
        el.textContent += '\n';
        await new Promise(r => setTimeout(r, 150));
      }
      await new Promise(r => setTimeout(r, 400));
      document.getElementById('boot-screen').style.display = 'none';
      document.getElementById('terminal').style.display = '';
      window.engine = new GameEngine();
      window.ui = new GameUI(window.engine);
      window.engine.init();
    })();

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
