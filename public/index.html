<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Oregon Trail — AI Edition</title>
  <meta name="description" content="AI-native Oregon Trail. Every playthrough is unique — powered by Claude as the dungeon master. Free, browser-playable, no login required.">
  <link rel="canonical" href="https://trail.osi-cyber.com/">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://trail.osi-cyber.com/">
  <meta property="og:title" content="The Oregon Trail — AI Edition">
  <meta property="og:description" content="Every run is a different story. An AI dungeon master generates unique events grounded in real 1848 history. Free, no login.">
  <meta property="og:image" content="https://trail.osi-cyber.com/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="The Oregon Trail — AI Edition">
  <meta name="twitter:description" content="AI-native Oregon Trail. No two runs are the same. Play free.">
  <meta name="twitter:image" content="https://trail.osi-cyber.com/og-image.png">
  <meta name="theme-color" content="#1a1a2e">
  <script defer data-domain="trail.osi-cyber.com" src="https://plausible.io/js/script.js"></script>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #html-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 100;
      background: rgba(10, 8, 6, 0.92);
      color: #f5e6c8;
      font-family: Georgia, 'Times New Roman', serif;
      overflow-y: auto;
    }
    #html-overlay.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #html-overlay .overlay-content {
      max-width: 560px;
      margin: 60px auto;
      padding: 32px;
      border: 2px solid #8b6914;
      border-radius: 4px;
      background: rgba(30, 22, 12, 0.95);
    }
    #html-overlay h2 {
      color: #d4a017;
      font-size: 22px;
      margin-bottom: 16px;
      text-align: center;
    }
    #html-overlay p {
      line-height: 1.6;
      margin-bottom: 12px;
      font-size: 15px;
    }
    #html-overlay .choice-btn {
      display: block;
      width: 100%;
      padding: 12px 16px;
      margin: 8px 0;
      background: #2a1f0e;
      color: #f5e6c8;
      border: 1px solid #8b6914;
      border-radius: 3px;
      font-family: Georgia, serif;
      font-size: 15px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
    }
    #html-overlay .choice-btn:hover {
      background: #3d2b14;
    }
    #newspaper-overlay { position: fixed; inset: 0; z-index: 200; display: none; background: rgba(0,0,0,0.9); overflow-y: auto; padding: 2rem; }
    #newspaper-overlay.active { display: flex; align-items: center; justify-content: center; }
    #tombstone-overlay { position: fixed; inset: 0; z-index: 200; display: none; background: rgba(0,0,0,0.9); overflow-y: auto; padding: 2rem; }
    #tombstone-overlay.active { display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div id="html-overlay"><div class="overlay-content" id="overlay-content"></div></div>
  <div id="newspaper-overlay"></div>
  <div id="tombstone-overlay"></div>
  <script src="html2canvas.min.js"></script>
  <script src="engine.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
